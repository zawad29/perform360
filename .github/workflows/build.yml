name: Build & publish images

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ${{ github.repository }}

jobs:
  # Build both targets back-to-back in one job so the heavy `deps` and
  # `builder` stages stay hot in BuildKit's local cache between them.
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read version from package.json
        id: version
        run: |
          version=$(node -p "require('./package.json').version")
          echo "value=$version" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute app tags
        id: meta-app
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}-app
          # Triggered only on `v*` tags (and manual dispatch). Each tag push
          # becomes the new `:latest` and gets a semver-named tag too.
          tags: |
            type=ref,event=tag
            type=match,pattern=v(\d+\.\d+\.\d+),group=1
            type=raw,value=latest

      - name: Compute worker tags
        id: meta-worker
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}-worker
          tags: |
            type=ref,event=tag
            type=match,pattern=v(\d+\.\d+\.\d+),group=1
            type=raw,value=latest

      - name: Build & push app
        uses: docker/build-push-action@v5
        with:
          context: .
          target: runner
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta-app.outputs.tags }}
          labels: ${{ steps.meta-app.outputs.labels }}
          build-args: |
            APP_VERSION=${{ steps.version.outputs.value }}
          cache-from: type=gha,scope=build
          cache-to: type=gha,scope=build,mode=max

      - name: Build & push worker
        uses: docker/build-push-action@v5
        with:
          context: .
          target: worker
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta-worker.outputs.tags }}
          labels: ${{ steps.meta-worker.outputs.labels }}
          build-args: |
            APP_VERSION=${{ steps.version.outputs.value }}
          cache-from: type=gha,scope=build
          cache-to: type=gha,scope=build,mode=max

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      # Publishing a Release (not just pushing a tag) is what makes the
      # in-app /api/version/latest endpoint surface this version to admins.
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
